<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SHIFT AI Elite Agents — 21スキル一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --mono: 'SF Mono', Menlo, Consolas, monospace;
  --g0: #D63177;
  --g1: #9B35B5;
  --g2: #5C35B0;
  --grad: linear-gradient(135deg, #D63177 0%, #9B35B5 55%, #5C35B0 100%);
  --bg:      #F5F0FB;
  --surface: #FFFFFF;
  --card:    #FFFFFF;
  --border:  #E2D4F0;
  --text:    #1A1529;
  --muted:   #7A6A90;
  --faint:   #C4B0D4;
  --inv:     #FFFFFF;
  --c-output: #F59E0B;
  --c-biz:    #818CF8;
  --c-ops:    #10B981;
  --c-tech:   #8B5CF6;
  --c-expert: #EC4899;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Hero ── */
.hero {
  background: var(--grad);
  padding: 72px 40px 64px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 999px;
  padding: 6px 20px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  color: #fff; text-transform: uppercase;
  margin-bottom: 28px;
}
.hero-title {
  font-size: clamp(36px, 5vw, 72px);
  font-weight: 900; line-height: 1.1; letter-spacing: -0.02em;
  color: #fff; margin-bottom: 20px;
}
.hero-title .accent {
  background: rgba(255,255,255,0.22);
  border-radius: 8px;
  padding: 0 12px;
  display: inline-block;
}
.hero-sub {
  font-size: clamp(14px, 2vw, 18px); font-weight: 500;
  color: rgba(255,255,255,0.82); letter-spacing: 0.04em;
  margin-bottom: 44px;
}
.hero-stats {
  display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-size: 40px; font-weight: 900; letter-spacing: -0.02em; color: #fff; display: block; }
.stat-lbl { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 0.08em; margin-top: 4px; }

/* ── Filter bar ── */
.filter-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,240,251,0.93);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
}
.filter-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; gap: 8px; padding: 14px 0;
  overflow-x: auto; scrollbar-width: none;
}
.filter-inner::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  appearance: none;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted);
  font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 8px 18px; border-radius: 999px;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s ease;
}
.filter-btn:hover { border-color: var(--g0); color: var(--g0); }
.filter-btn.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 2px 12px rgba(214,49,119,0.30); transform: scale(1.03); }
.filter-btn[data-cat="output"].active { background: var(--c-output); box-shadow: 0 2px 12px rgba(245,158,11,0.3); }
.filter-btn[data-cat="biz"].active    { background: var(--c-biz);    box-shadow: 0 2px 12px rgba(129,140,248,0.3); }
.filter-btn[data-cat="ops"].active    { background: var(--c-ops);    box-shadow: 0 2px 12px rgba(16,185,129,0.3); }
.filter-btn[data-cat="tech"].active   { background: var(--c-tech);   box-shadow: 0 2px 12px rgba(139,92,246,0.3); }
.filter-btn[data-cat="expert"].active { background: var(--c-expert); box-shadow: 0 2px 12px rgba(236,72,153,0.3); }
.filter-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

/* ── Grid ── */
.grid-wrap { max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px; }
.grid-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.grid-count { font-size: 14px; color: var(--muted); letter-spacing: 0.04em; }
.grid-count span { color: var(--text); font-weight: 700; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* ── Card ── */
.skill-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.skill-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(155,53,181,0.13);
  border-color: rgba(214,49,119,0.28);
}
/* category glow */
.skill-card[data-cat="output"]:hover { box-shadow: 0 16px 40px rgba(245,158,11,0.13); border-color: rgba(245,158,11,0.32); }
.skill-card[data-cat="biz"]:hover    { box-shadow: 0 16px 40px rgba(129,140,248,0.13); border-color: rgba(129,140,248,0.32); }
.skill-card[data-cat="ops"]:hover    { box-shadow: 0 16px 40px rgba(16,185,129,0.13);  border-color: rgba(16,185,129,0.32); }
.skill-card[data-cat="tech"]:hover   { box-shadow: 0 16px 40px rgba(139,92,246,0.13);  border-color: rgba(139,92,246,0.32); }
.skill-card[data-cat="expert"]:hover { box-shadow: 0 16px 40px rgba(236,72,153,0.13);  border-color: rgba(236,72,153,0.32); }

/* illustration area */
.card-illus {
  width: 100%; height: 110px;
  overflow: hidden;
  flex-shrink: 0;
  display: block;
}
.card-illus svg { width: 100%; height: 100%; display: block; }

.card-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.card-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
.card-cat-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 999px;
}
.card-name-en {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--faint); letter-spacing: 0.02em;
}
.card-name-ja {
  font-size: 20px; font-weight: 900; letter-spacing: -0.01em;
  color: var(--text); line-height: 1.2;
}
.card-tagline {
  font-size: 13px; font-weight: 500; color: var(--muted);
  line-height: 1.55; flex: 1;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4px;
}
.card-cmd {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--muted); background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 9px;
}
.card-arrow {
  font-size: 18px; color: var(--faint);
  transition: color 0.2s, transform 0.2s;
}
.skill-card:hover .card-arrow { color: var(--g0); transform: translateX(3px); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(26,21,41,0.55);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: #FFFFFF;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  width: 100%; max-width: 640px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.25s cubic-bezier(.2,.8,.2,1);
  position: relative;
  box-shadow: 0 24px 80px rgba(92,53,176,0.18);
}
.modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
.modal-accent { height: 5px; border-radius: 20px 20px 0 0; }
.modal-inner { padding: 32px; }
.modal-close {
  position: absolute; top: 20px; right: 20px;
  appearance: none; background: var(--bg);
  border: 1.5px solid var(--border); color: var(--muted); cursor: pointer;
  width: 36px; height: 36px; border-radius: 50%;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: var(--font);
}
.modal-close:hover { background: var(--g0); color: #fff; border-color: var(--g0); }
.modal-head { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.modal-icon { font-size: 48px; line-height: 1; }
.modal-cat-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
  margin-bottom: 6px; display: inline-block;
}
.modal-name-ja { font-size: 28px; font-weight: 900; letter-spacing: -0.01em; color: var(--text); }
.modal-name-en { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-top: 4px; }
.modal-desc {
  font-size: 15px; line-height: 1.75; color: var(--muted);
  margin-bottom: 24px; padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.modal-section { margin-bottom: 20px; }
.modal-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--faint); margin-bottom: 12px;
}
.feature-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.feature-list li {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 500; color: var(--text);
  padding: 10px 14px; background: var(--bg); border-radius: 8px;
}
.feature-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cmd-block {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
}
.cmd-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); flex-shrink: 0; }
.cmd-value {
  font-family: var(--mono); font-size: 16px; font-weight: 700;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  letter-spacing: 0.02em;
}
.cmd-copy {
  margin-left: auto; appearance: none;
  background: var(--grad); border: none; color: #fff;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  padding: 6px 16px; border-radius: 6px; cursor: pointer;
  transition: opacity 0.2s;
}
.cmd-copy:hover { opacity: 0.85; }
.agent-list { display: flex; flex-wrap: wrap; gap: 8px; }
.agent-chip {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--muted); background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 6px;
  padding: 5px 12px; letter-spacing: 0.01em;
}

/* ── Footer ── */
.page-footer {
  border-top: 1px solid var(--border);
  padding: 32px 40px; text-align: center;
  color: var(--faint); font-size: 13px;
}
.page-footer a {
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  text-decoration: none; font-weight: 700;
}
.skill-card.hidden { display: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">✦ Claude Code Skills</div>
  <h1 class="hero-title">SHIFT AI <span class="accent">Elite Agents</span></h1>
  <p class="hero-sub">Claude Codeを「仕事の武器」にする、21種の業務特化AIスキル</p>
  <div class="hero-stats">
    <div class="stat-item"><span class="stat-num">21</span><div class="stat-lbl">スキル</div></div>
    <div class="stat-item"><span class="stat-num">5</span><div class="stat-lbl">カテゴリ</div></div>
    <div class="stat-item"><span class="stat-num">27</span><div class="stat-lbl">専門エージェント</div></div>
  </div>
</header>

<div class="filter-wrap">
  <div class="filter-inner">
    <button class="filter-btn active" data-cat="all">
      <span class="filter-dot" style="background:var(--g0)"></span>すべて (21)
    </button>
    <button class="filter-btn" data-cat="output">
      <span class="filter-dot" style="background:var(--c-output)"></span>制作・出力 (5)
    </button>
    <button class="filter-btn" data-cat="biz">
      <span class="filter-dot" style="background:var(--c-biz)"></span>ビジネス戦略 (3)
    </button>
    <button class="filter-btn" data-cat="ops">
      <span class="filter-dot" style="background:var(--c-ops)"></span>業務効率化 (4)
    </button>
    <button class="filter-btn" data-cat="tech">
      <span class="filter-dot" style="background:var(--c-tech)"></span>デザイン・技術 (3)
    </button>
    <button class="filter-btn" data-cat="expert">
      <span class="filter-dot" style="background:var(--c-expert)"></span>専門知識 (6)
    </button>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid-header">
    <div class="grid-count"><span id="visible-count">21</span> スキルを表示中</div>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

<footer class="page-footer">
  <p>SHIFT AI Elite Agents &nbsp;|&nbsp; <a href="https://yukikiki2011-cloud.github.io/OPEN2026/" target="_blank">yukikiki2011-cloud.github.io/OPEN2026</a></p>
</footer>

<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-accent" id="modal-accent"></div>
    <button class="modal-close" id="modal-close" aria-label="閉じる">✕</button>
    <div class="modal-inner">
      <div class="modal-head">
        <div class="modal-icon" id="modal-icon"></div>
        <div class="modal-title-group">
          <div class="modal-cat-badge" id="modal-cat-badge"></div>
          <div class="modal-name-ja" id="modal-name-ja"></div>
          <div class="modal-name-en" id="modal-name-en"></div>
        </div>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-section">
        <div class="modal-section-title">できること</div>
        <ul class="feature-list" id="modal-features"></ul>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">起動コマンド</div>
        <div class="cmd-block">
          <span class="cmd-label">Claude Code</span>
          <span class="cmd-value" id="modal-cmd"></span>
          <button class="cmd-copy" id="cmd-copy-btn">コピー</button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">関連エージェント</div>
        <div class="agent-list" id="modal-agents"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CATS = {
  output: { label: '制作・出力',    color: '#F59E0B', textDark: true  },
  biz:    { label: 'ビジネス戦略',  color: '#818CF8', textDark: false },
  ops:    { label: '業務効率化',    color: '#10B981', textDark: false },
  tech:   { label: 'デザイン・技術',color: '#8B5CF6', textDark: false },
  expert: { label: '専門知識',      color: '#EC4899', textDark: false },
};

/* SVG illustration inner content for each skill.
   Wrapped in makeIllus() which adds <svg> wrapper + bg tint. */
function makeIllus(inner, c) {
  return `<svg viewBox="0 0 280 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="280" height="110" fill="${c}" fill-opacity=".07"/>
    <circle cx="20" cy="15" r="50" fill="${c}" fill-opacity=".08"/>
    <circle cx="260" cy="95" r="55" fill="${c}" fill-opacity=".06"/>
    ${inner}
  </svg>`;
}

const ILLUS = {
/* ── 制作・出力 ── */
'slide-maker': c => makeIllus(`
  <rect x="62" y="20" width="118" height="78" rx="5" fill="white" stroke="${c}" stroke-opacity=".22" stroke-width="1.5"/>
  <rect x="55" y="26" width="118" height="76" rx="5" fill="white" stroke="${c}" stroke-opacity=".45" stroke-width="1.5"/>
  <rect x="48" y="32" width="118" height="74" rx="5" fill="white" stroke="${c}" stroke-width="2"/>
  <rect x="48" y="32" width="118" height="15" rx="5" fill="${c}" fill-opacity=".18"/>
  <rect x="60" y="38" width="46" height="5" rx="2.5" fill="${c}"/>
  <rect x="60" y="58" width="94" height="3.5" rx="1.75" fill="${c}" fill-opacity=".2"/>
  <rect x="60" y="67" width="80" height="3.5" rx="1.75" fill="${c}" fill-opacity=".2"/>
  <rect x="60" y="76" width="87" height="3.5" rx="1.75" fill="${c}" fill-opacity=".2"/>
  <circle cx="218" cy="42" r="14" fill="${c}" fill-opacity=".12"/>
  <circle cx="218" cy="42" r="7"  fill="${c}" fill-opacity=".25"/>
`, c),

'content-creator': c => makeIllus(`
  <rect x="42" y="28" width="130" height="5" rx="2.5" fill="${c}" fill-opacity=".18"/>
  <rect x="42" y="40" width="150" height="5" rx="2.5" fill="${c}" fill-opacity=".12"/>
  <rect x="42" y="52" width="120" height="5" rx="2.5" fill="${c}" fill-opacity=".18"/>
  <rect x="42" y="64" width="140" height="5" rx="2.5" fill="${c}" fill-opacity=".12"/>
  <rect x="42" y="76" width="80"  height="5" rx="2.5" fill="${c}" fill-opacity=".3"/>
  <path d="M200 80 L225 28 L238 33 L213 85 Z" fill="${c}" fill-opacity=".7"/>
  <path d="M200 80 L208 77 L213 85 Z" fill="${c}"/>
  <line x1="213" y1="85" x2="208" y2="96" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
`, c),

'report-writer': c => makeIllus(`
  <rect x="70" y="16" width="108" height="84" rx="6" fill="white" stroke="${c}" stroke-opacity=".35" stroke-width="1.5"/>
  <rect x="83" y="28" width="60" height="6" rx="3" fill="${c}"/>
  <rect x="83" y="42" width="82" height="3.5" rx="1.75" fill="${c}" fill-opacity=".2"/>
  <rect x="83" y="52" width="74" height="3.5" rx="1.75" fill="${c}" fill-opacity=".2"/>
  <rect x="83" y="65" width="18" height="22" rx="2" fill="${c}" fill-opacity=".55"/>
  <rect x="107" y="72" width="18" height="15" rx="2" fill="${c}" fill-opacity=".4"/>
  <rect x="131" y="60" width="18" height="27" rx="2" fill="${c}" fill-opacity=".7"/>
`, c),

'text-quality-checker': c => makeIllus(`
  <rect x="44" y="24" width="136" height="4" rx="2" fill="${c}" fill-opacity=".15"/>
  <rect x="44" y="36" width="120" height="4" rx="2" fill="${c}" fill-opacity=".15"/>
  <rect x="44" y="48" width="130" height="4" rx="2" fill="${c}" fill-opacity=".15"/>
  <rect x="44" y="60" width="110" height="4" rx="2" fill="${c}" fill-opacity=".15"/>
  <rect x="44" y="72" width="124" height="4" rx="2" fill="${c}" fill-opacity=".15"/>
  <circle cx="208" cy="36" r="14" fill="${c}" fill-opacity=".15"/>
  <circle cx="208" cy="36" r="14" stroke="${c}" stroke-width="2" fill="none"/>
  <path d="M201 36 l5 5 l9-10" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="232" cy="62" r="10" fill="${c}" fill-opacity=".15"/>
  <circle cx="232" cy="62" r="10" stroke="${c}" stroke-width="2" fill="none"/>
  <path d="M226.5 62 l4 4 l7-8" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
`, c),

'image-prompt-generator': c => makeIllus(`
  <rect x="58" y="18" width="60" height="44" rx="5" fill="white" stroke="${c}" stroke-opacity=".3" stroke-width="1.5"/>
  <rect x="126" y="18" width="60" height="44" rx="5" fill="white" stroke="${c}" stroke-opacity=".3" stroke-width="1.5"/>
  <rect x="58" y="68" width="60" height="28" rx="5" fill="white" stroke="${c}" stroke-opacity=".3" stroke-width="1.5"/>
  <rect x="126" y="68" width="60" height="28" rx="5" fill="white" stroke="${c}" stroke-opacity=".3" stroke-width="1.5"/>
  <circle cx="88" cy="40" r="12" fill="${c}" fill-opacity=".2"/>
  <circle cx="156" cy="40" r="9"  fill="${c}" fill-opacity=".3"/>

// ── Build cards ──
const grid = document.getElementById('card-grid');
SKILLS.forEach(s => {
  const cat = CATS[s.cat];

  // Build illustration as CSS background-image (data URI) to avoid innerHTML SVG parsing issues
  const illustDiv = document.createElement('div');
  illustDiv.className = 'card-illus';
  const illustFn = ILLUS[s.id];
  if (illustFn) {
    const svgStr = illustFn(cat.color);
    illustDiv.style.backgroundImage = "url('data:image/svg+xml;charset=utf8," + encodeURIComponent(svgStr) + "')";
    illustDiv.style.backgroundSize = 'cover';
    illustDiv.style.backgroundPosition = 'center';
  } else {
    illustDiv.style.background = cat.color + '10';
  }

  const card = document.createElement('div');
  card.className = 'skill-card';
  card.dataset.cat = s.cat;
  card.dataset.id = s.id;
  card.appendChild(illustDiv);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${s.icon}</div>
        <div class="card-cat-badge" style="background:${cat.color}18;color:${cat.color}">${cat.label}</div>
      </div>
      <div class="card-name-en">${s.id}</div>
      <div class="card-name-ja">${s.ja}</div>
      <div class="card-tagline">${s.tagline}</div>
      <div class="card-footer">
        <span class="card-cmd">${s.cmd}</span>
        <span class="card-arrow">&#8250;</span>
      </div>`;
  card.appendChild(body);
  card.addEventListener('click', () => openModal(s));
  grid.appendChild(card);
});

// ── Filter ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    let visible = 0;
    document.querySelectorAll('.skill-card').forEach(card => {
      const show = cat === 'all' || card.dataset.cat === cat;
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    document.getElementById('visible-count').textContent = visible;
  });
});

// ── Modal ──
const modal = document.getElementById('modal');
let currentCmd = '';

function openModal(s) {
  const cat = CATS[s.cat];
  document.getElementById('modal-accent').style.background = cat.color;
  document.getElementById('modal-icon').textContent = s.icon;
  const badge = document.getElementById('modal-cat-badge');
  badge.textContent = cat.label;
  badge.style.background = cat.color + '18';
  badge.style.color = cat.color;
  document.getElementById('modal-name-ja').textContent = s.ja;
  document.getElementById('modal-name-en').textContent = s.id;
  document.getElementById('modal-desc').textContent = s.desc;

  const featEl = document.getElementById('modal-features');
  featEl.innerHTML = s.features.map(f =>
    `<li><span class="feature-dot" style="background:${cat.color}"></span>${f}</li>`
  ).join('');

  currentCmd = s.cmd;
  document.getElementById('modal-cmd').textContent = s.cmd;
  document.getElementById('modal-agents').innerHTML = s.agents.length
    ? s.agents.map(a => `<span class="agent-chip">${a}</span>`).join('')
    : `<span style="font-size:13px;color:var(--faint);font-style:italic">このスキルの専用エージェントは未実装です</span>`;

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('cmd-copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(currentCmd).then(() => {
    const btn = document.getElementById('cmd-copy-btn');
    btn.textContent = 'コピー済み ✓';
    setTimeout(() => { btn.textContent = 'コピー'; }, 1500);
  }).catch(() => {
    const btn = document.getElementById('cmd-copy-btn');
    btn.textContent = currentCmd;
  });
});
</script>
