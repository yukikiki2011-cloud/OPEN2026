<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>案件コーチ ELITE — agents &amp; modules</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --mono: 'SF Mono', Menlo, Consolas, monospace;
  --grad: linear-gradient(135deg, #1E1B4B 0%, #4C1D95 55%, #7C3AED 100%);
  --bg:      #F5F3FF;
  --surface: #FFFFFF;
  --border:  #DDD6FE;
  --text:    #1E1B4B;
  --muted:   #7C6FA0;
  --faint:   #C4B5FD;
  --c-analyze:  #3B82F6;
  --c-coaching: #10B981;
  --c-techsales:#8B5CF6;
  --c-action:   #F59E0B;
  --c-module:   #EC4899;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Hero ── */
.hero {
  background: var(--grad);
  padding: 72px 40px 64px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 80%, rgba(255,255,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 15%, rgba(255,255,255,0.05) 0%, transparent 60%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.30);
  border-radius: 999px;
  padding: 6px 20px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  color: #fff; text-transform: uppercase;
  margin-bottom: 28px;
}
.hero-title {
  font-size: clamp(32px, 5vw, 68px);
  font-weight: 900; line-height: 1.1; letter-spacing: -0.02em;
  color: #fff; margin-bottom: 20px;
}
.hero-title .accent {
  background: rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 2px 14px;
  display: inline-block;
}
.hero-sub {
  font-size: clamp(13px, 2vw, 17px); font-weight: 500;
  color: rgba(255,255,255,0.80); letter-spacing: 0.04em;
  margin-bottom: 44px;
}
.hero-stats {
  display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-size: 40px; font-weight: 900; letter-spacing: -0.02em; color: #fff; display: block; }
.stat-lbl { font-size: 12px; color: rgba(255,255,255,0.72); letter-spacing: 0.08em; margin-top: 4px; }

/* ── Filter bar ── */
.filter-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,243,255,0.93);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
}
.filter-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; gap: 8px; padding: 14px 0;
  overflow-x: auto; scrollbar-width: none;
}
.filter-inner::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  appearance: none;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted);
  font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 8px 18px; border-radius: 999px;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s ease;
}
.filter-btn:hover { border-color: #7C3AED; color: #7C3AED; }
.filter-btn.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 2px 12px rgba(76,29,149,0.30); transform: scale(1.03); }
.filter-btn[data-cat="analyze"].active  { background: var(--c-analyze);  box-shadow: 0 2px 12px rgba(59,130,246,0.32); }
.filter-btn[data-cat="coaching"].active { background: var(--c-coaching); box-shadow: 0 2px 12px rgba(16,185,129,0.32); }
.filter-btn[data-cat="techsales"].active{ background: var(--c-techsales);box-shadow: 0 2px 12px rgba(139,92,246,0.32); }
.filter-btn[data-cat="action"].active   { background: var(--c-action);   box-shadow: 0 2px 12px rgba(245,158,11,0.32); }
.filter-btn[data-cat="module"].active   { background: var(--c-module);   box-shadow: 0 2px 12px rgba(236,72,153,0.32); }
.filter-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

/* ── Grid ── */
.grid-wrap { max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px; }
.grid-header { margin-bottom: 28px; }
.grid-count { font-size: 14px; color: var(--muted); letter-spacing: 0.04em; }
.grid-count span { color: var(--text); font-weight: 700; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ── Card ── */
.skill-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
}
.skill-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 14px 36px rgba(76,29,149,0.11);
  border-color: rgba(124,58,237,0.25);
}
.skill-card[data-cat="analyze"]:hover  { box-shadow: 0 14px 36px rgba(59,130,246,0.12);  border-color: rgba(59,130,246,0.30); }
.skill-card[data-cat="coaching"]:hover { box-shadow: 0 14px 36px rgba(16,185,129,0.12);  border-color: rgba(16,185,129,0.30); }
.skill-card[data-cat="techsales"]:hover{ box-shadow: 0 14px 36px rgba(139,92,246,0.12);  border-color: rgba(139,92,246,0.30); }
.skill-card[data-cat="action"]:hover   { box-shadow: 0 14px 36px rgba(245,158,11,0.12);  border-color: rgba(245,158,11,0.30); }
.skill-card[data-cat="module"]:hover   { box-shadow: 0 14px 36px rgba(236,72,153,0.12);  border-color: rgba(236,72,153,0.30); }

.card-illus {
  width: 100%; height: 90px;
  overflow: hidden; flex-shrink: 0;
}
.card-illus svg { width: 100%; height: 100%; display: block; }

.card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.card-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
.card-cat-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
}
.card-name-en {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--faint); letter-spacing: 0.02em;
}
.card-name-ja {
  font-size: 17px; font-weight: 900; letter-spacing: -0.01em;
  color: var(--text); line-height: 1.25;
}
.card-tagline {
  font-size: 13px; font-weight: 500; color: var(--muted);
  line-height: 1.55; flex: 1;
}
.card-foot {
  display: flex; align-items: center;
  margin-top: 6px;
}
.card-type {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px;
}

.skill-card.hidden { display: none; }

/* ── Footer ── */
.page-footer {
  border-top: 1px solid var(--border);
  padding: 28px 40px; text-align: center;
  color: var(--faint); font-size: 13px;
}
.page-footer strong {
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
</style>
</head>
<body>

function catColor(cat) {
  const m = { analyze:'#3B82F6', coaching:'#10B981', techsales:'#8B5CF6', action:'#F59E0B', module:'#EC4899' };
  return m[cat] || '#8B5CF6';
}

function renderCards(filter) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  let count = 0;
  CARDS.forEach(card => {
    if (filter !== 'all' && card.cat !== filter) return;
    count++;
    const c = catColor(card.cat);
    const illusFn = ILLUS[card.id];
    const illusHtml = illusFn ? illusFn(c) : '';
    const el = document.createElement('article');
    el.className = 'skill-card';
    el.dataset.cat = card.cat;
    el.innerHTML = `
      <div class="card-illus">${illusHtml}</div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-icon">${card.icon}</div>
          <span class="card-cat-badge" style="background:${c}18;color:${c}">${CATS[card.cat].label}</span>
        </div>
        <div class="card-name-en">${card.nameEn}</div>
        <div class="card-name-ja">${card.nameJa}</div>
        <div class="card-tagline">${card.tagline}</div>
        <div class="card-foot">
          <span class="card-type">${card.type === 'module' ? 'MODULE' : 'AGENT'}</span>
        </div>
      </div>`;
    grid.appendChild(el);
  });
  document.getElementById('visible-count').textContent = count;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.cat);
  });
});

renderCards('all');
